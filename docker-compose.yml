services:
  scion:
    build: .
    ports:
      - "4111:4111"
    env_file: .env
    environment:
      - MASTRA_SERVER_HOST=0.0.0.0
    volumes:
      - scion-data:/app/.agent/data
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: '1.5'
    pids_limit: 100
    tmpfs:
      - /tmp:size=100M

volumes:
  scion-data:
