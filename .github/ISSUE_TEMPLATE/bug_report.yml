name: Bug Report
description: Report a bug in Scion
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Configure channel '...'
        2. Send message '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Channel
      description: Which messaging channel is affected?
      options:
        - Slack
        - Telegram
        - Discord
        - WhatsApp
        - Google Chat
        - Signal
        - iMessage
        - N/A (not channel-specific)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 24.04, macOS 15, Windows 11
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Bun / Node Version
      placeholder: e.g., Bun 1.2.3 or Node 22.13.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
